<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Download Hub</h1>
        <button id="btnOpenAdmin">Admin</button>
    </header>

    <main id="app">
        <section id="gallery" class="grid-container">
            </section>
    </main>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="loginSection">
                <h2>Acesso Restrito</h2>
                <input type="password" id="adminPass" placeholder="Senha Admin">
                <button onclick="checkLogin()">Entrar</button>
            </div>
            
            <div id="adminPanel" style="display: none;">
                <h2>Gerenciar Conteúdo</h2>
                <form id="uploadForm">
                    <input type="text" id="fileName" placeholder="Nome do Arquivo" required>
                    <input type="text" id="fileThumb" placeholder="URL da Imagem (Thumbnail)" required>
                    <input type="text" id="fileUrl" placeholder="URL de Download" required>
                    <input type="text" id="uploaderName" placeholder="Seu Nome" required>
                    <button type="submit">Adicionar Postagem</button>
                </form>
                <hr>
                <div id="editList">
                    </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
