<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaquinha Pro - Sistema Flexível</title>
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #2ecc71;
            --accent: #3498db;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #eef2f3; margin: 0; padding: 10px; color: var(--dark); line-height: 1.6; }
        
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--light); padding-bottom: 15px; }
        
        /* Grid de Números Responsivo */
        .grid-numeros { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); 
            gap: 8px; 
            margin: 20px 0; 
            max-height: 400px; 
            overflow-y: auto; 
            padding: 10px;
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        .num { 
            aspect-ratio: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px solid #ddd; 
            cursor: pointer; 
            font-size: 14px; 
            border-radius: 8px; 
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .num.disponivel:hover { background: var(--secondary); color: white; border-color: var(--primary); transform: translateY(-2px); }
        .num.ocupado { background: #dfe6e9; color: #b2bec3; cursor: not-allowed; border-color: #dcdde1; text-decoration: line-through; }
        .num.selecionado { background: var(--accent); color: white; border-color: #2980b9; box-shadow: 0 0 10px rgba(52,152,219,0.5); }

        /* Formulário Responsivo */
        .form-user { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        @media (max-width: 600px) { .form-user { grid-template-columns: 1fr; } }
        
        .full { grid-column: 1 / -1; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .btn-principal { 
            background: var(--primary); color: white; padding: 18px; border: none; 
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; 
            transition: background 0.3s;
        }
        .btn-principal:hover { background: var(--secondary); }

        /* Seções de Listas */
        .secao { margin-top: 40px; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        tr.gold { background: #fffde7; border-left: 4px solid #f1c40f; }

        /* Painel Admin */
        .admin-box { background: #34495e; color: white; padding: 20px; border-radius: 10px; margin-top: 50px; }
        .admin-controls { display: none; margin-top: 20px; border-top: 1px solid #5d6d7e; padding-top: 20px; }
        .flex-admin { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .flex-admin > * { flex: 1; min-width: 150px; }

        /* Histórico */
        .historico-card { background: var(--light); border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; }

        .thumb { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--secondary); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🐮 Vaquinha Digital</h1>
        <p id="infoVaquinha">Escolha um número e ajude-nos a bater a meta!</p>
    </header>

    <div id="gridNumeros" class="grid-numeros"></div>

    <div class="form-user">
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="text" id="tel" maxlength="4" placeholder="4 últimos dígitos do Tel">
        <input type="text" id="pix" placeholder="Sua Chave Pix">
        <input type="number" id="valor" placeholder="Valor do Pagamento">
        <input type="text" id="link" class="full" placeholder="Link (Rede Social ou Comprovante Cloud)">
        <div class="full">
            <label style="font-size: 14px; color: #666;">Foto/Comprovante:</label>
            <input type="file" id="foto" accept="image/*">
        </div>
        <input type="hidden" id="numEscolhido">
        <button class="btn-principal full" onclick="registrar()">REGISTRAR PARTICIPAÇÃO</button>
    </div>

    <div class="secao">
        <h2>🏆 Ranking de Pagantes</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nº</th>
                        <th>Foto</th>
                        <th>Nome</th>
                        <th>Valor</th>
                    </tr>
                </thead>
                <tbody id="corpoRanking"></tbody>
            </table>
        </div>
    </div>

    <div class="secao" id="secaoConcluidas">
        <h2>✅ Vaquinhas Concluídas</h2>
        <div id="listaHistorico"></div>
    </div>

    <div class="admin-box">
        <button onclick="acessoAdmin()" style="background:none; color:white; border:1px solid white; padding:5px 15px; cursor:pointer; border-radius:5px;">Acesso Administrativo</button>
        
        <div id="adminArea" class="admin-controls">
            <h3>Configurações do Sistema</h3>
            <div class="flex-admin">
                <div>
                    <label>Quantidade de Números:</label>
                    <input type="number" id="configQtde" value="100">
                </div>
                <div>
                    <label>Título da Vaquinha:</label>
                    <input type="text" id="configTitulo" placeholder="Ex: Churrasco do Junior">
                </div>
            </div>
            <button onclick="salvarConfig()" style="background:var(--accent); color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Atualizar Configurações</button>
            <button onclick="encerrarVaquinha()" style="background:var(--primary); color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Finalizar e Mover para Histórico</button>
            <button onclick="limparTudo()" style="background:var(--danger); color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Limpar Tudo</button>
        </div>
    </div>
</div>

<script>
    // Inicialização de dados
    let config = JSON.parse(localStorage.getItem('v_config')) || { titulo: "Vaquinha Digital", total: 100 };
    let participantes = JSON.parse(localStorage.getItem('v_dados')) || [];
    let historico = JSON.parse(localStorage.getItem('v_historico')) || [];

    function init() {
        document.querySelector('h1').innerText = config.titulo;
        renderGrid();
        renderRanking();
        renderHistorico();
    }

    function renderGrid() {
        const grid = document.getElementById('gridNumeros');
        grid.innerHTML = '';
        for (let i = 1; i <= config.total; i++) {
            const part = participantes.find(p => p.numero == i);
            const div = document.createElement('div');
            div.className = `num ${part ? 'ocupado' : 'disponivel'}`;
            div.innerText = i;
            if (!part) div.onclick = () => {
                document.querySelectorAll('.num').forEach(n => n.classList.remove('selecionado'));
                div.classList.add('selecionado');
                document.getElementById('numEscolhido').value = i;
            };
            grid.appendChild(div);
        }
    }

    function registrar() {
        const n = document.getElementById('numEscolhido').value;
        const nome = document.getElementById('nome').value;
        const tel = document.getElementById('tel').value;
        const valor = parseFloat(document.getElementById('valor').value);
        if(!n || !nome || !valor) return alert("Selecione o número e preencha os dados!");

        const fotoFile = document.getElementById('foto').files[0];
        if (fotoFile) {
            const reader = new FileReader();
            reader.onload = (e) => salvar(n, nome, tel, valor, e.target.result);
            reader.readAsDataURL(fotoFile);
        } else {
            salvar(n, nome, tel, valor, null);
        }
    }

    function salvar(numero, nome, tel, valor, foto) {
        participantes.push({ 
            numero, nome, tel, valor, foto, 
            pix: document.getElementById('pix').value,
            link: document.getElementById('link').value 
        });
        localStorage.setItem('v_dados', JSON.stringify(participantes));
        location.reload();
    }

    function renderRanking() {
        const corpo = document.getElementById('corpoRanking');
        const ordenado = [...participantes].sort((a,b) => b.valor - a.valor);
        corpo.innerHTML = ordenado.map((p, i) => `
            <tr class="${i === 0 ? 'gold' : ''}">
                <td><b>${p.numero}</b></td>
                <td><img src="${p.foto || 'https://via.placeholder.com/40'}" class="thumb"></td>
                <td>${p.link ? `<a href="${p.link}" target="_blank">${p.nome}</a>` : p.nome} <br><small>****-${p.tel}</small></td>
                <td>R$ ${p.valor.toFixed(2)}</td>
            </tr>
        `).join('');
    }

    function renderHistorico() {
        const lista = document.getElementById('listaHistorico');
        lista.innerHTML = historico.map(h => `
            <div class="historico-card">
                <strong>${h.titulo}</strong> - Total Arrecadado: R$ ${h.totalVal.toFixed(2)}<br>
                <small>Finalizada em: ${h.data}</small>
            </div>
        `).join('');
    }

    // ADMIN FUNCTIONS
    function acessoAdmin() {
        if (prompt("Senha Admin:") === "1234") {
            document.getElementById('adminArea').style.display = 'block';
        }
    }

    function salvarConfig() {
        config.total = parseInt(document.getElementById('configQtde').value);
        config.titulo = document.getElementById('configTitulo').value || "Vaquinha Digital";
        localStorage.setItem('v_config', JSON.stringify(config));
        location.reload();
    }

    function encerrarVaquinha() {
        if (participantes.length === 0) return alert("Nenhum dado para encerrar.");
        const totalArrecadado = participantes.reduce((sum, p) => sum + p.valor, 0);
        const novaHistorico = {
            titulo: config.titulo,
            totalVal: totalArrecadado,
            data: new Date().toLocaleDateString('pt-BR')
        };
        historico.push(novaHistorico);
        localStorage.setItem('v_historico', JSON.stringify(historico));
        localStorage.removeItem('v_dados');
        alert("Vaquinha movida para o histórico!");
        location.reload();
    }

    function limparTudo() {
        if(confirm("Apagar TUDO (incluindo histórico)?")) {
            localStorage.clear();
            location.reload();
        }
    }

    init();
</script>

</body>
</html>
