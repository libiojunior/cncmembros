<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevHub | Biblioteca Privada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text x='0' y='14' font-size='16'>⚙️</text></svg>" type="image/svg+xml">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden-admin { display: none !important; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-2">
            <i data-lucide="terminal" class="text-sky-400"></i>
            <span class="font-bold text-xl tracking-tighter">DEV<span class="text-sky-400">HUB</span></span>
        </div>
        <div class="flex items-center gap-4">
            <button id="admin-toggle" class="hidden px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition text-sm font-medium flex items-center gap-2">
                <i data-lucide="settings" class="w-4 h-4"></i>
                <span>Painel Admin</span>
            </button>
            <button id="logout-btn" class="hidden px-4 py-2 rounded-lg bg-red-600 hover:bg-red-700 transition text-sm font-medium">
                Sair
            </button>
        </div>
    </nav>

    <!-- VIEW: LIBRARY -->
    <main id="view-library" class="container mx-auto px-6 py-12">
        <div class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h1 class="text-5xl font-black mb-4 bg-gradient-to-r from-white to-slate-500 bg-clip-text text-transparent">Meus Arquivos</h1>
                <p class="text-slate-400">Pesquise seus recursos ou use o código de acesso.</p>
            </div>
            
            <div class="relative w-full md:w-96">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 w-5 h-5"></i>
                <input type="text" id="main-search" placeholder="Buscar arquivos..." 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-sky-500 outline-none transition-all">
            </div>
        </div>

        <div id="files-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>
    </main>

    <!-- VIEW: ADMIN PANEL -->
    <main id="view-admin" class="hidden-admin container mx-auto px-6 py-12">
        <div class="max-w-5xl mx-auto glass rounded-[40px] p-10">
            <button id="back-to-library" class="mb-8 text-slate-400 hover:text-white flex items-center gap-2 transition">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> 
                Voltar para Biblioteca
            </button>
            
            <h2 class="text-3xl font-bold mb-8">Gerenciamento de Postagens</h2>
            
            <!-- Add/Edit Post Section -->
            <section class="admin-section mb-8 bg-slate-800/50 rounded-xl p-6">
                <h3 class="text-xl font-bold mb-6">Adicionar/Editar Postagem</h3>
                <form id="post-form" class="admin-form space-y-4">
                    <input type="hidden" id="post-id">
                    
                    <div>
                        <label for="post-title" class="block text-sm font-medium mb-2">Título da Postagem:</label>
                        <input type="text" id="post-title" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 focus:ring-2 focus:ring-sky-500 outline-none" required>
                    </div>
                    
                    <div>
                        <label for="post-thumbnail" class="block text-sm font-medium mb-2">URL da Imagem (Thumbnail):</label>
                        <input type="url" id="post-thumbnail" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 focus:ring-2 focus:ring-sky-500 outline-none" required>
                    </div>
                    
                    <div>
                        <label for="editor" class="block text-sm font-medium mb-2">Conteúdo da Postagem / Descrição:</label>
                        <div id="editor" class="bg-slate-700 rounded-lg"></div>
                        <input type="hidden" id="post-content-html">
                    </div>

                    <div>
                        <label for="post-download-link" class="block text-sm font-medium mb-2">Link do Botão de Download (Opcional):</label>
                        <input type="url" id="post-download-link" placeholder="Ex: https://seusite.com/arquivo.pdf" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 focus:ring-2 focus:ring-sky-500 outline-none">
                    </div>
                    
                    <div class="form-actions flex gap-3 pt-4">
                        <button type="submit" class="px-6 py-2 bg-sky-600 hover:bg-sky-700 rounded-lg font-medium transition">
                            Salvar Postagem
                        </button>
                        <button type="button" class="hidden px-6 py-2 bg-slate-600 hover:bg-slate-700 rounded-lg font-medium transition" id="cancel-edit-btn">
                            Cancelar Edição
                        </button>
                    </div>
                </form>
            </section>

            <hr class="border-slate-700 my-8">

            <!-- Current Posts Section -->
            <section class="admin-section">
                <h3 class="text-xl font-bold mb-6">Postagens Atuais</h3>
                <div class="admin-list" id="post-admin-list">
                    <p class="text-slate-400">Carregando postagens...</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="border-t border-slate-700 mt-12 py-6 text-center text-slate-400">
        <p>&copy; 2026 DevHub. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="app.js"></script>
    <script src="script.js"></script>
</body>
</html>
