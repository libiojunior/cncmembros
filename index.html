<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Vaquinha - Game Pad & Station</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --success: #00b894;
            --danger: #d63031;
            --dark: #2d3436;
            --light: #dfe6e9;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 15px; color: var(--dark); }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--light); transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        .header-info { background: var(--dark); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .header-info h2 { margin: 0 0 10px 0; color: var(--secondary); }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9em; }

        .grid-rifa { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .cota { border: 2px solid #eee; border-radius: 8px; padding: 10px; text-align: center; position: relative; background: #fff; transition: 0.2s; }
        .cota.ocupada { border-color: var(--success); background: #e8f8f5; }
        .cota.selecionada { border-color: var(--primary); box-shadow: 0 0 10px rgba(108, 92, 231, 0.3); }
        .cota .num-label { position: absolute; top: 2px; left: 5px; font-size: 0.7em; color: #aaa; font-weight: bold; }
        .cota .nome-user { font-size: 0.85em; font-weight: bold; display: block; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cota .tel-user { font-size: 0.75em; color: #636e72; }

        .form-user { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f9f9f9; padding: 20px; border-radius: 10px; }
        .full { grid-column: span 2; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button.btn-confirmar { background: var(--success); color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }

        .admin-section { margin-top: 40px; border-top: 2px dashed #ccc; padding-top: 20px; }
        .admin-btn { background: #636e72; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .concluida-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        @media (max-width: 500px) { .grid-rifa { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('andamento')">Em Andamento</button>
        <button class="tab-btn" onclick="switchTab('concluidas')">Concluídas</button>
    </div>

    <div id="view-andamento">
        <div class="header-info">
            <h2 id="display-titulo">Projeto Game Pad e Game Station</h2>
            <div class="info-grid">
                <div>VALOR TOTAL: <br><b id="display-total">R$ 0,00</b></div>
                <div>VALOR DA COTA: <br><b id="display-cota">R$ 0,00</b></div>
                <div class="full" style="margin-top:10px; border-top: 1px solid #444; padding-top:10px;">
                    PIX PARA PAGAMENTO: <br><b id="display-pix">Defina no Painel</b>
                </div>
            </div>
        </div>

        <div id="grid-rifa" class="grid-rifa"></div>

        <div id="form-registro" class="form-user">
            <h3 class="full" style="margin:0">Registrar Cota <span id="num-selecionado"></span></h3>
            <input type="text" id="user-nome" placeholder="Nome Completo">
            <input type="text" id="user-tel" maxlength="4" placeholder="4 últimos dígitos do Telefone">
            <input type="hidden" id="input-numero">
            <button class="btn-confirmar full" onclick="salvarParticipacao()">CONFIRMAR MEU NÚMERO</button>
        </div>
    </div>

    <div id="view-concluidas" style="display:none">
        <h2>Histórico de Projetos</h2>
        <div id="lista-concluidas"></div>
    </div>

    <div class="admin-section">
        <button class="admin-btn" onclick="abrirAdmin()">⚙️ Painel Admin (Senha: 1234)</button>
        <div id="admin-controls" style="display:none; background:#eee; padding:20px; margin-top:10px; border-radius:10px;">
            <h4>Configurações Gerais</h4>
            <label>Título:</label><input type="text" id="conf-titulo" value="Projeto Game Pad e Game Station"><br><br>
            <label>Valor Total R$:</label><input type="number" id="conf-total"><br><br>
            <label>Valor Cota R$:</label><input type="number" id="conf-cota"><br><br>
            <label>Chave Pix:</label><input type="text" id="conf-pix"><br><br>
            <label>Total de Cotas:</label><input type="number" id="conf-cotas-total" value="20"><br><br>
            <button onclick="salvarConfig()" style="background:var(--primary); color:white; border:none; padding:10px; cursor:pointer;">Atualizar Vaquinha</button>
            <button onclick="finalizarVaquinha()" style="background:var(--success); color:white; border:none; padding:10px; cursor:pointer;">Finalizar e Salvar Histórico</button>
            <button onclick="resetar()" style="background:var(--danger); color:white; border:none; padding:10px; cursor:pointer;">Limpar Dados</button>
        </div>
    </div>
</div>

<script>
    let config = JSON.parse(localStorage.getItem('v3_config')) || { titulo: "Projeto Game Pad e Game Station", total: 0, cota: 0, pix: "", numCotas: 20 };
    let participacoes = JSON.parse(localStorage.getItem('v3_part')) || [];
    let historico = JSON.parse(localStorage.getItem('v3_hist')) || [];

    function init() {
        document.getElementById('display-titulo').innerText = config.titulo;
        document.getElementById('display-total').innerText = `R$ ${parseFloat(config.total).toFixed(2)}`;
        document.getElementById('display-cota').innerText = `R$ ${parseFloat(config.cota).toFixed(2)}`;
        document.getElementById('display-pix').innerText = config.pix || "A definir";
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('grid-rifa');
        grid.innerHTML = '';
        for (let i = 1; i <= config.numCotas; i++) {
            const p = participacoes.find(x => x.numero == i);
            const div = document.createElement('div');
            div.className = `cota ${p ? 'ocupada' : 'disponivel'}`;
            
            if (p) {
                div.innerHTML = `<span class="num-label">${i}</span>
                                 <span class="nome-user">${p.nome}</span>
                                 <span class="tel-user">****-${p.tel}</span>`;
            } else {
                div.innerHTML = `<span class="num-label">${i}</span><span class="nome-user">LIVRE</span>`;
                div.onclick = () => selecionar(i, div);
            }
            grid.appendChild(div);
        }
    }

    function selecionar(num, el) {
        document.querySelectorAll('.cota').forEach(d => d.classList.remove('selecionado'));
        el.classList.add('selecionado');
        document.getElementById('num-selecionado').innerText = `(Nº ${num})`;
        document.getElementById('input-numero').value = num;
    }

    function salvarParticipacao() {
        const num = document.getElementById('input-numero').value;
        const nome = document.getElementById('user-nome').value;
        const tel = document.getElementById('user-tel').value;

        if (!num) return alert("Clique em um número livre no grid!");
        if (!nome || tel.length < 4) return alert("Preencha o nome e os 4 dígitos do telefone!");

        participacoes.push({ numero: num, nome, tel });
        localStorage.setItem('v3_part', JSON.stringify(participacoes));
        location.reload();
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        if (tab === 'andamento') {
            document.getElementById('view-andamento').style.display = 'block';
            document.getElementById('view-concluidas').style.display = 'none';
        } else {
            document.getElementById('view-andamento').style.display = 'none';
            document.getElementById('view-concluidas').style.display = 'block';
            renderHistorico();
        }
    }

    function renderHistorico() {
        const lista = document.getElementById('lista-concluidas');
        lista.innerHTML = historico.length ? '' : '<p>Nenhuma vaquinha concluída.</p>';
        historico.forEach(h => {
            lista.innerHTML += `
                <div class="concluida-card">
                    <div>
                        <strong>${h.titulo}</strong><br>
                        <small>Total: R$ ${h.total.toFixed(2)} | Data: ${h.data}</small>
                    </div>
                    <span style="color:var(--success)">✅ Finalizada</span>
                </div>
            `;
        });
    }

    function abrirAdmin() {
        if (prompt("Senha:") === "1234") document.getElementById('admin-controls').style.display = 'block';
    }

    function salvarConfig() {
        config.titulo = document.getElementById('conf-titulo').value;
        config.total = document.getElementById('conf-total').value;
        config.cota = document.getElementById('conf-cota').value;
        config.pix = document.getElementById('conf-pix').value;
        config.numCotas = document.getElementById('conf-cotas-total').value;
        localStorage.setItem('v3_config', JSON.stringify(config));
        location.reload();
    }

    function finalizarVaquinha() {
        if (!confirm("Isso moverá os dados atuais para o histórico e resetará a lista. Continuar?")) return;
        historico.push({
            titulo: config.titulo,
            total: participacoes.length * config.cota,
            data: new Date().toLocaleDateString('pt-BR')
        });
        localStorage.setItem('v3_hist', JSON.stringify(historico));
        localStorage.removeItem('v3_part');
        location.reload();
    }

    function resetar() { if(confirm("Apagar TUDO?")) { localStorage.clear(); location.reload(); } }

    init();
</script>

</body>
</html>
