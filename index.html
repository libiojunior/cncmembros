<main id="view-admin" class="admin-hidden container mx-auto px-6 py-12">
    <div class="max-w-5xl mx-auto space-y-8">
        <div class="flex justify-between items-center">
            <button onclick="location.reload()" class="text-slate-400 hover:text-white flex items-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Sair
            </button>
            <input type="password" id="gh-token" placeholder="GitHub Token" class="bg-slate-950 border border-slate-700 rounded-xl px-4 py-2 text-sm outline-none w-64">
        </div>

        <div class="glass rounded-[30px] p-8">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i data-lucide="layout" class="text-sky-400"></i> Conteúdo da Home
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-slate-500 mb-2">Título Principal</label>
                    <input type="text" id="edit-home-title" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 outline-none focus:border-sky-500">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-slate-500 mb-2">Descrição</label>
                    <input type="text" id="edit-home-desc" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 outline-none focus:border-sky-500">
                </div>
            </div>
        </div>

        <div class="glass rounded-[30px] p-8">
            <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                <i data-lucide="file-json" class="text-amber-400"></i> Banco de Dados (config.json)
            </h3>
            <p class="text-sm text-slate-500 mb-4">Edite os links de download e imagens aqui.</p>
            <textarea id="json-editor" readonly class="w-full h-80 bg-slate-950 font-mono text-xs border border-slate-800 rounded-2xl p-6 outline-none text-amber-200 mb-6" placeholder="Insira o Token para carregar o JSON..."></textarea>
            
            <button onclick="saveConfigJSON()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl transition flex items-center justify-center gap-3">
                <i data-lucide="save" class="w-5 h-5"></i> SALVAR CONFIGURAÇÕES
            </button>
        </div>

        <div class="glass rounded-[30px] p-8">
            <h3 class="text-xl font-bold mb-4">Código Fonte (index.html)</h3>
            <textarea id="code-editor" readonly class="w-full h-64 bg-slate-950 font-mono text-xs border border-slate-800 rounded-2xl p-6 outline-none text-sky-200 mb-6"></textarea>
            <button onclick="saveIndexHTML()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-4 rounded-xl transition flex items-center justify-center gap-3">
                <i data-lucide="code" class="w-5 h-5"></i> ATUALIZAR ESTRUTURA DO SITE
            </button>
        </div>
    </div>
</main>
